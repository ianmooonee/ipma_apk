name: ipma_apk
description: Weather and sea forecast for Portugal using api.ipma.pt
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  provider: ^6.1.2
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  package_info_plus: ^8.0.2
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  # 1024×1024 PNG, full-bleed. Used for legacy launcher icon.
  image_path: "assets/icon/icon.png"
  # Adaptive icon (Android 8+). Foreground = 1024×1024 PNG with ~25% padding
  # around the logo (Android crops/zooms it). Background is a solid hex or path.
  adaptive_icon_background: "#00000000"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21
